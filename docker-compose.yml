name: ovs

services:

  # ── Backend (Node.js / Express) ──────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: ovs-backend
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://localhost:27017/online_voting_system

  # ── Frontend (React / Vite) ──────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: ovs-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    env_file:
      - ./frontend/.env

  # ── Mobile (Expo web / Metro) ────────────────────────────────────────────────
  mobile:
    build: ./mobile
    container_name: ovs-mobile
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./mobile:/app
      - mobile_modules:/app/node_modules
    env_file:
      - ./mobile/.env
    environment:
      EXPO_NO_TELEMETRY: "1"

volumes:
  backend_modules:
  frontend_modules:
  mobile_modules:
